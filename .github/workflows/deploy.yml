name: Deploy Privex to DigitalOcean

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install backend dependencies
        run: cd backend && npm install

      - name: Install frontend dependencies
        run: cd frontend/chat_app && npm install

      - name: Build frontend (catches build errors early)
        run: cd frontend/chat_app && npm run build

  deploy:
    needs: test               # only runs if "test" job succeeds
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST || secrets.HOST }}
          username: ${{ secrets.SSH_USER || secrets.SSH_USERNAME || secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY || secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd ~/privex
            git pull origin main
            cd backend && npm install --production && cd ..
            cd frontend/chat_app && npm install && npm run build && cd ../..
            pm2 restart privex